<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarePath Dashboard</title>

<!--
  ============================================================
  CAREPATH STRATEGIES — PERSONAL DASHBOARD
  ============================================================
  HOW TO EDIT YOUR LINKS
  ----------------------
  Scroll down to the BOARDS section in the <script> at the bottom.
  Each board (CarePath Hub, Learning Hub) is a block you can edit.
  To add a link, copy a line and change the name + url.
  To add a whole new board, copy a board block and rename it.
  That's it — no other code needs to change.

  HOW TO USE THIS FILE
  --------------------
  • Quick test: just double-click the file to open it in your browser.
  • Set as Chrome homepage / new tab:
      - Host it (e.g. drop it in your GitHub Pages repo as
        dashboard.html, giving you carepathstrategies.com/dashboard.html
        — keep it unlinked from your public site if you want it private),
        OR keep the file locally and use a "custom new tab" extension that
        accepts a file path / URL.
      - Chrome: Settings → On startup → Open a specific page → paste the URL.
      - Chrome: Settings → Appearance → Show home button → set the URL.
  • Edits you make in the page itself (the + Add buttons) are saved in
    THIS browser only (localStorage). For edits that travel with the file,
    edit the BOARDS list in the code below.
  ============================================================
-->

<style>
  :root{
    --navy:#163d6b;
    --navy-deep:#0f2e52;
    --green:#5fa838;
    --green-deep:#4d8c2c;
    --gray:#6d6e71;
    --orange:#f5921e;
    --blue:#2596d4;
    --ink:#1f2933;
    --paper:#f4f6f9;
    --card:#ffffff;
    --line:#e3e8ef;
    --shadow:0 1px 2px rgba(15,46,82,.06), 0 6px 20px rgba(15,46,82,.07);
    --shadow-lift:0 4px 10px rgba(15,46,82,.10), 0 14px 34px rgba(15,46,82,.12);
    --radius:16px;
    --font:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--font);
    color:var(--ink);
    background:
      radial-gradient(1100px 520px at 88% -8%, rgba(37,150,212,.10), transparent 60%),
      radial-gradient(900px 520px at 8% 8%, rgba(95,168,56,.10), transparent 55%),
      var(--paper);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1160px;margin:0 auto;padding:30px 24px 60px}

  /* ---------- Header ---------- */
  header{
    display:flex;align-items:flex-end;justify-content:space-between;
    gap:24px;flex-wrap:wrap;margin-bottom:26px;
  }
  .brand{display:flex;align-items:center;gap:14px}
  .pin{
    position:relative;width:34px;height:34px;flex:0 0 auto;
  }
  .pin svg{display:block}
  .wordmark{line-height:1}
  .wordmark .name{font-size:30px;font-weight:800;letter-spacing:-.5px}
  .wordmark .name .care{color:var(--navy)}
  .wordmark .name .path{color:var(--green)}
  .wordmark .tag{
    margin-top:4px;font-size:11px;letter-spacing:4px;color:var(--gray);
    font-weight:600;text-transform:uppercase;
    display:flex;align-items:center;gap:8px;
  }
  .wordmark .tag::before,.wordmark .tag::after{
    content:"";height:1px;width:14px;background:var(--line);
  }
  .clock{text-align:right;color:var(--navy)}
  .clock .time{font-size:30px;font-weight:700;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
  .clock .date{font-size:12.5px;color:var(--gray);margin-top:2px;font-weight:600}

  /* ---------- Search ---------- */
  .searchbar{
    display:flex;align-items:center;gap:10px;background:var(--card);
    border:1px solid var(--line);border-radius:999px;padding:11px 18px;
    box-shadow:var(--shadow);margin-bottom:22px;
  }
  .searchbar svg{flex:0 0 auto}
  .searchbar input{
    border:0;outline:0;font-size:15px;width:100%;color:var(--ink);
    background:transparent;font-family:var(--font);
  }
  .searchbar input::placeholder{color:#9aa6b4}
  .searchbar .go{
    border:0;cursor:pointer;background:var(--navy);color:#fff;
    font-weight:600;font-size:13px;padding:8px 16px;border-radius:999px;
    transition:background .15s;
  }
  .searchbar .go:hover{background:var(--navy-deep)}

  /* ---------- Board tabs ---------- */
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
  .tab{
    border:1px solid var(--line);background:var(--card);color:var(--gray);
    font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;
    padding:9px 18px;border-radius:999px;transition:all .16s;
    display:flex;align-items:center;gap:8px;
  }
  .tab .dot{width:8px;height:8px;border-radius:50%;background:currentColor;opacity:.55}
  .tab:hover{color:var(--navy);border-color:#c9d4e2}
  .tab.active{background:var(--navy);border-color:var(--navy);color:#fff}
  .tab.active .dot{opacity:1}
  .tab.add{color:var(--gray);border-style:dashed}

  /* ---------- Board ---------- */
  .board{display:none;animation:fade .28s ease}
  .board.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.board{animation:none}}

  .columns{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:18px;align-items:start;
  }
  .group{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden;
  }
  .group h3{
    display:flex;align-items:center;gap:10px;
    font-size:12px;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--navy);font-weight:700;padding:15px 18px 12px;
    border-bottom:1px solid var(--line);
  }
  .group h3 .bar{width:18px;height:3px;border-radius:2px;background:var(--green)}
  .group ul{list-style:none;padding:8px}
  .tile{
    display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--ink);
    padding:10px 11px;border-radius:11px;transition:background .14s,transform .14s;
  }
  .tile:hover{background:#f0f4f9;transform:translateX(2px)}
  .tile .ico{
    width:30px;height:30px;border-radius:8px;flex:0 0 auto;
    display:grid;place-items:center;font-weight:700;font-size:13px;color:#fff;
    overflow:hidden;background:var(--navy);
  }
  .tile .ico img{width:100%;height:100%;object-fit:cover}
  .tile .txt{min-width:0}
  .tile .txt .t{font-size:14.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tile .txt .u{font-size:11.5px;color:var(--gray);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tile .rm{
    margin-left:auto;border:0;background:transparent;color:#c2ccd8;cursor:pointer;
    font-size:16px;line-height:1;padding:4px 6px;border-radius:6px;opacity:0;transition:opacity .14s,color .14s;
  }
  .tile:hover .rm{opacity:1}
  .tile .rm:hover{color:var(--orange);background:#fff3e3}

  .group .addlink{
    width:calc(100% - 16px);margin:0 8px 10px;border:1px dashed var(--line);
    background:transparent;color:var(--gray);font-family:var(--font);font-size:13px;
    font-weight:600;cursor:pointer;padding:9px;border-radius:11px;transition:all .14s;
  }
  .group .addlink:hover{border-color:var(--green);color:var(--green-deep);background:#f3f9ee}

  footer{margin-top:30px;text-align:center;color:#9aa6b4;font-size:12px}
  footer b{color:var(--gray)}

  /* ---------- Add-group card ---------- */
  .group.ghost{
    border-style:dashed;box-shadow:none;background:transparent;
    display:grid;place-items:center;min-height:120px;
  }
  .group.ghost button{
    border:0;background:transparent;color:var(--gray);font-family:var(--font);
    font-size:14px;font-weight:600;cursor:pointer;padding:14px 18px;border-radius:12px;
  }
  .group.ghost button:hover{color:var(--navy)}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <div class="pin" aria-hidden="true">
        <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 30C8 26 9 20 14 18C19 16 18 11 23 9" stroke="url(#g)" stroke-width="4.5" stroke-linecap="round"/>
          <path d="M24 3.5C27.6 3.5 30.5 6.4 30.5 10C30.5 14.4 24 20 24 20C24 20 17.5 14.4 17.5 10C17.5 6.4 20.4 3.5 24 3.5Z" fill="var(--orange)"/>
          <circle cx="24" cy="10" r="2.4" fill="#fff"/>
          <defs>
            <linearGradient id="g" x1="3" y1="30" x2="23" y2="9" gradientUnits="userSpaceOnUse">
              <stop stop-color="var(--green)"/><stop offset="1" stop-color="var(--blue)"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="wordmark">
        <div class="name"><span class="care">Care</span><span class="path">Path</span></div>
        <div class="tag">Strategies</div>
      </div>
    </div>
    <div class="clock">
      <div class="time" id="time">—</div>
      <div class="date" id="date">—</div>
    </div>
  </header>

  <div class="searchbar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#9aa6b4" stroke-width="2"/><path d="M20 20l-3.5-3.5" stroke="#9aa6b4" stroke-width="2" stroke-linecap="round"/></svg>
    <input id="search" type="text" placeholder="Search the web…" autocomplete="off">
    <button class="go" id="searchGo">Search</button>
  </div>

  <div class="tabs" id="tabs"></div>
  <div id="boards"></div>

  <footer>
    <b>CarePath Strategies</b> · Healthcare Expertise. Operational Impact. Measurable Results.
  </footer>
</div>

<script>
/* ============================================================
   BOARDS — edit your links here
   ============================================================
   Each board has a "name" and a list of "groups".
   Each group has a "title" and a list of "links" (name + url).
   Add, remove, or rename freely. Save the file and reload.
   ============================================================ */
const BOARDS = [
  {
    id:"carepath",
    name:"CarePath Hub",
    groups:[
      {
        title:"Site & SEO",
        links:[
          {name:"CarePath Website", url:"https://carepathstrategies.com"},
          {name:"Google Search Console", url:"https://search.google.com/search-console"},
          {name:"Bing Webmaster Tools", url:"https://www.bing.com/webmasters"},
          {name:"Namecheap (DNS)", url:"https://www.namecheap.com/myaccount/login/"},
          {name:"GitHub Repo", url:"https://github.com/dm2021crh/Della-Miller"},
          {name:"GitHub", url:"https://github.com"}
        ]
      },
      {
        title:"Email & Comms",
        links:[
          {name:"Zoho Mail", url:"https://mail.zoho.com"},
          {name:"Google Voice", url:"https://voice.google.com"}
        ]
      },
      {
        title:"Files & Tools",
        links:[
          {name:"Dropbox — CarePath", url:"https://www.dropbox.com/home"}, /* swap for your CarePath folder link */
          {name:"Google Drive", url:"https://drive.google.com"},
          {name:"NotebookLM", url:"https://notebooklm.google.com"}
        ]
      },
      {
        title:"Government & Banking",
        links:[
          {name:"MS Secretary of State — Business", url:"https://www.sos.ms.gov/business-services"},
          {name:"SAM.gov", url:"https://sam.gov"},
          {name:"Navy Federal Credit Union", url:"https://digitalomni.navyfederal.org/nfcu-online-banking/"}
        ]
      },
      {
        title:"Listings & Profiles",
        links:[
          {name:"LinkedIn", url:"https://www.linkedin.com/in/dellamiller"},
          {name:"X (@DellaM_Miller)", url:"https://x.com/DellaM_Miller"},
          {name:"Upwork", url:"https://www.upwork.com"},
          {name:"Contra", url:"https://contra.com"},
          {name:"Alignable", url:"https://www.alignable.com"},
          {name:"Google Business Profile", url:"https://business.google.com"},
          {name:"Crunchbase", url:"https://www.crunchbase.com"}
        ]
      }
    ]
  },
  {
    id:"learning",
    name:"Learning Hub",
    groups:[
      {
        title:"Certifications & Courses",
        links:[
          {name:"Axxess Certification", url:"https://certification.axxessweb.com/course/index.php?categoryid=367&page=2"},
          {name:"Coursera — PMP", url:"https://www.coursera.org"}
        ]
      }
    ]
  },
  {
    id:"benchmark",
    name:"Benchmark",
    groups:[
      {
        title:"Engagement",
        links:[
          {name:"Benchmark", url:"https://benchmark.care"},
          {name:"Dropbox — Benchmark", url:"https://www.dropbox.com/home"} /* swap for your Benchmark folder link */
        ]
      }
    ]
  },
  {
    id:"momentum",
    name:"Momentum",
    groups:[
      {
        title:"Engagement",
        links:[
          {name:"Slack", url:"https://slack.com/signin"},   /* update to your workspace URL once you have access */
          {name:"HubSpot", url:"https://app.hubspot.com/login"},
          {name:"Dropbox — Momentum", url:"https://www.dropbox.com/home"} /* swap for your Momentum folder link */
        ]
      }
    ]
  },
  {
    id:"advisory",
    name:"Advisory Board",
    groups:[
      {
        title:"Tellegacy",
        links:[
          {name:"Tellegacy", url:"https://tellegacy.org"}
        ]
      }
    ]
  }
];
/* ============================================================ */

const STORE_KEY = "carepath-dashboard-v2";

/* Merge in any edits saved in this browser (graceful if storage is blocked). */
function loadBoards(){
  try{
    const saved = localStorage.getItem(STORE_KEY);
    if(saved) return JSON.parse(saved);
  }catch(e){/* storage unavailable — fall back to defaults */}
  return BOARDS;
}
function saveBoards(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(boards)); }
  catch(e){/* preview environments block storage; edits stay for this session only */}
}

let boards = loadBoards();
let active = boards[0] ? boards[0].id : null;

const palette = ["#163d6b","#5fa838","#2596d4","#f5921e","#4d8c2c","#6d6e71","#0f2e52"];
function host(url){ try{ return new URL(url).hostname.replace(/^www\./,""); }catch(e){ return url; } }
function favicon(url){ return "https://www.google.com/s2/favicons?sz=64&domain=" + encodeURIComponent(host(url)); }
function initial(name){ return (name.trim()[0] || "•").toUpperCase(); }

const tabsEl = document.getElementById("tabs");
const boardsEl = document.getElementById("boards");

function render(){
  tabsEl.innerHTML = "";
  boards.forEach((b,i)=>{
    const t = document.createElement("button");
    t.className = "tab" + (b.id===active ? " active":"");
    t.innerHTML = '<span class="dot"></span>' + b.name;
    t.onclick = ()=>{ active=b.id; render(); };
    tabsEl.appendChild(t);
  });
  const addBoard = document.createElement("button");
  addBoard.className = "tab add";
  addBoard.textContent = "+ Board";
  addBoard.onclick = ()=>{
    const name = prompt("Name this board (e.g. Finance, Marketing):");
    if(!name) return;
    const id = "b" + Date.now();
    boards.push({id, name, groups:[{title:"Links", links:[]}]});
    active = id; saveBoards(); render();
  };
  tabsEl.appendChild(addBoard);

  boardsEl.innerHTML = "";
  boards.forEach(b=>{
    const board = document.createElement("div");
    board.className = "board" + (b.id===active ? " active":"");
    const cols = document.createElement("div");
    cols.className = "columns";

    b.groups.forEach((g, gi)=>{
      const card = document.createElement("div");
      card.className = "group";
      const h = document.createElement("h3");
      h.innerHTML = '<span class="bar"></span>' + g.title;
      card.appendChild(h);

      const ul = document.createElement("ul");
      g.links.forEach((link, li)=>{
        const a = document.createElement("a");
        a.className = "tile"; a.href = link.url; a.target = "_blank"; a.rel = "noopener";
        const ico = document.createElement("span");
        ico.className = "ico";
        ico.style.background = palette[(gi+li) % palette.length];
        ico.textContent = initial(link.name);
        const img = document.createElement("img");
        img.alt = ""; img.loading = "lazy"; img.src = favicon(link.url);
        img.onload = ()=>{ ico.textContent = ""; };
        img.onerror = ()=>{ img.remove(); };
        ico.appendChild(img);
        a.appendChild(ico);
        const txt = document.createElement("span");
        txt.className = "txt";
        txt.innerHTML = '<span class="t"></span><span class="u"></span>';
        txt.querySelector(".t").textContent = link.name;
        txt.querySelector(".u").textContent = host(link.url);
        a.appendChild(txt);
        const rm = document.createElement("button");
        rm.className = "rm"; rm.title = "Remove"; rm.textContent = "×";
        rm.onclick = (e)=>{ e.preventDefault(); g.links.splice(li,1); saveBoards(); render(); };
        a.appendChild(rm);
        ul.appendChild(a);
      });
      card.appendChild(ul);

      const add = document.createElement("button");
      add.className = "addlink"; add.textContent = "+ Add link";
      add.onclick = ()=>{
        const name = prompt("Link name:"); if(!name) return;
        let url = prompt("Link URL:"); if(!url) return;
        if(!/^https?:\/\//i.test(url)) url = "https://" + url;
        g.links.push({name, url}); saveBoards(); render();
      };
      card.appendChild(add);
      cols.appendChild(card);
    });

    /* add-a-group ghost card */
    const ghost = document.createElement("div");
    ghost.className = "group ghost";
    const gbtn = document.createElement("button");
    gbtn.textContent = "+ Add group";
    gbtn.onclick = ()=>{
      const title = prompt("Group title (e.g. Billing, Clients):");
      if(!title) return;
      b.groups.push({title, links:[]}); saveBoards(); render();
    };
    ghost.appendChild(gbtn);
    cols.appendChild(ghost);

    board.appendChild(cols);
    boardsEl.appendChild(board);
  });
}

/* Search */
function doSearch(){
  const q = document.getElementById("search").value.trim();
  if(q) window.open("https://www.google.com/search?q=" + encodeURIComponent(q), "_blank");
}
document.getElementById("searchGo").onclick = doSearch;
document.getElementById("search").addEventListener("keydown", e=>{ if(e.key==="Enter") doSearch(); });

/* Clock */
function tick(){
  const now = new Date();
  document.getElementById("time").textContent =
    now.toLocaleTimeString([], {hour:"numeric", minute:"2-digit"});
  document.getElementById("date").textContent =
    now.toLocaleDateString([], {weekday:"long", month:"long", day:"numeric"});
}
tick(); setInterval(tick, 1000);

render();
</script>
</body>
</html>
